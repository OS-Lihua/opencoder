name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # Run full test suite before building release artifacts
  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features --workspace

  build:
    name: Build (${{ matrix.suffix }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
            cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: linux-x64-musl
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x64
            cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x64
            cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Linux musl dependencies
      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Cross compilation
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p opencoder-cli

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} -p opencoder-cli

      # Strip debug symbols
      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          if command -v strip &>/dev/null; then
            strip target/${{ matrix.target }}/release/opencoder 2>/dev/null || true
          fi

      # Package
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../opencoder-${{ matrix.suffix }}.tar.gz opencoder

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/opencoder.exe" -DestinationPath "opencoder-${{ matrix.suffix }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencoder-${{ matrix.suffix }}
          path: opencoder-${{ matrix.suffix }}.*
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum opencoder-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenCoder v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/opencoder-*
            artifacts/checksums-sha256.txt
          body: |
            ## Installation

            **macOS (Apple Silicon)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/opencoder-macos-arm64.tar.gz | tar xz
            sudo mv opencoder /usr/local/bin/
            ```

            **macOS (Intel)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/opencoder-macos-x64.tar.gz | tar xz
            sudo mv opencoder /usr/local/bin/
            ```

            **Linux (x64)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/opencoder-linux-x64.tar.gz | tar xz
            sudo mv opencoder /usr/local/bin/
            ```

            **Linux (x64, static musl)**
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/opencoder-linux-x64-musl.tar.gz | tar xz
            sudo mv opencoder /usr/local/bin/
            ```

            **From source**
            ```bash
            cargo install --git https://github.com/${{ github.repository }} opencoder-cli
            ```

            See checksums-sha256.txt to verify downloads.

  # Publish to crates.io (manual approval via environment protection rules)
  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish crates (in dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          crates=(
            core
            patch
            shell
            pty
            provider
            file
            lsp
            mcp
            snapshot
            project
            tool
            session
            agent
            server
            cli
          )
          for crate in "${crates[@]}"; do
            echo "Publishing opencoder-${crate}..."
            cargo publish -p "opencoder-${crate}" --allow-dirty || true
            sleep 15  # wait for crates.io index update
          done
