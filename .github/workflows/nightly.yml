name: Nightly

on:
  schedule:
    - cron: '0 0 * * *'  # UTC midnight
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run audit
        run: cargo audit

  outdated:
    name: Dependency freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-outdated
        run: cargo install cargo-outdated
      - name: Check outdated
        run: cargo outdated --exit-code 1 || true

  nightly-build:
    name: Nightly build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin opencoder
      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/opencoder 2>/dev/null || true
      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/opencoder-nightly-${{ matrix.suffix }}.tar.gz \
            -C target/${{ matrix.target }}/release opencoder
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencoder-nightly-${{ matrix.suffix }}
          path: dist/opencoder-nightly-${{ matrix.suffix }}.tar.gz
